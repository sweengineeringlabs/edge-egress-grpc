[package]
name         = "swe-edge-egress-grpc"
version.workspace      = true
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description  = "edge — egress gRPC outbound domain: request/response types and outbound trait."
keywords     = ["gateway", "egress", "grpc", "sea", "swe"]
categories   = ["network-programming"]

[lib]
path = "src/lib.rs"

[features]
default = []

[dependencies]
serde.workspace       = true
thiserror.workspace   = true
async-trait.workspace = true
futures.workspace     = true
bytes            = "1"
http             = { workspace = true }
http-body-util   = "0.1"
hyper            = { version = "1", features = ["http2"] }
hyper-util       = { version = "0.1", features = ["client-legacy", "tokio", "http2"] }
hyper-rustls     = { version = "0.27", features = ["http2", "webpki-tokio"] }
tokio            = { version = "1", features = ["rt", "net", "time"] }

[dev-dependencies]
tokio      = { version = "1", features = ["rt-multi-thread", "macros", "time", "net"] }
hyper      = { version = "1", features = ["http2", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
bytes      = "1"
http-body      = "1"
http-body-util = "0.1"
futures    = "0.3"
