# SEA project configuration (L0)
[project]
name = "swe-edge-egress-grpc"
workspaces = [
    "transport",
    "retry",
    "breaker",
    "resilient",
    "auth-bearer",
]

[workspace.transport]
path = "main/features/transport"
crate = "swe-edge-egress-grpc-transport"

[workspace.retry]
path = "main/features/retry"
crate = "swe-edge-egress-grpc-retry"

[workspace.breaker]
path = "main/features/breaker"
crate = "swe-edge-egress-grpc-breaker"

[workspace.auth-bearer]
path = "main/features/auth-bearer"
crate = "swe-edge-egress-grpc-auth-bearer"

[workspace.resilient]
path = "main/features/resilient"
crate = "swe-edge-egress-grpc-resilient"
