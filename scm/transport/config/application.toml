# edge-transport-grpc-egress runtime defaults.
#
# ResilienceConfig fields used by create_transport_from_config() when
# constructing a retry + circuit-breaker stack from GrpcChannelConfig::resilience.

[resilience]
max_attempts                  = 3
initial_backoff_ms            = 100
backoff_multiplier            = 2.0
jitter_factor                 = 0.1
max_backoff_ms                = 2000
rate_limit_max_attempts       = 2
rate_limit_initial_backoff_ms = 1000
rate_limit_max_backoff_ms     = 10000
failure_threshold             = 5
cool_down_seconds             = 10
half_open_probe_count         = 1
