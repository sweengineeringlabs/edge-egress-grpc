# SWE default resilient gRPC transport policy.
#
# This crate assembles a TonicGrpcClient wrapped with retry and
# circuit-breaker layers. The values here are calibrated for typical
# RPC traffic where transient errors clear within a few hundred
# milliseconds. The caller's per-call deadline always acts as the
# total budget — even if max_attempts allows more tries, the retry
# loop stops when the deadline is exhausted.

[grpc_resilient]
# Maximum attempts per request (1 = no retry). 3 balances recovery
# coverage against server amplification.
max_attempts = 3

# Delay before the first retry, in milliseconds.
initial_backoff_ms = 100

# Exponential backoff base.
backoff_multiplier = 2.0

# Jitter as a fraction of the computed backoff (prevents thundering-herd).
jitter_factor = 0.1

# Upper bound on any single retry backoff, in milliseconds.
max_backoff_ms = 2000

# Rate-limit retry track.
rate_limit_max_attempts = 2
rate_limit_initial_backoff_ms = 1000
rate_limit_max_backoff_ms = 10000

# Circuit-breaker settings.
failure_threshold = 5
cool_down_seconds = 30
half_open_probe_count = 1
